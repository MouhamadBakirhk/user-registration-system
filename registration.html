<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Registration Form</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.datatables.net/1.13.6/css/dataTables.bootstrap5.min.css">
</head>
<body class="bg-light">

<div class="container mt-5">
    <!-- Registration Form -->
    <div class="card mb-5">
        <div class="card-header bg-primary text-white">Registration Form</div>
        <div class="card-body">
            <form id="registrationForm">
                <input type="hidden" id="userId" name="userId">
                <div class="mb-3">
                    <label>Username</label>
                    <input type="text" id="username" name="username" class="form-control" required>
                </div>
                <div class="mb-3">
                    <label>Email</label>
                    <input type="email" id="email" name="email" class="form-control" required>
                </div>
                <div class="mb-3">
                    <label>Password</label>
                    <input type="password" id="password" name="password" class="form-control" required>
                </div>
                <button type="submit" class="btn btn-success">Register</button>
            </form>
        </div>
    </div>

    <!-- Accounts List -->
    <div class="card">
        <div class="card-header bg-secondary text-white">Accounts List</div>
        <div class="card-body">
            <table id="accountsTable" class="table table-bordered table-striped">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Username</th>
                        <th>Email</th>
                        <th>Created At</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody>
                    <!-- Data will be loaded here from API -->
                </tbody>
            </table>
        </div>
    </div>
</div>

<!-- Scripts -->
<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
<script src="https://cdn.datatables.net/1.13.6/js/jquery.dataTables.min.js"></script>
<script src="https://cdn.datatables.net/1.13.6/js/dataTables.bootstrap5.min.js"></script>

<script>
$(document).ready(function() {
   let table = $('#accountsTable').DataTable({
    ajax: {
        url: './API/api.php?action=select',
        dataSrc: 'data'   // مهم جداً
    },
    columns: [
        { data: 'id' },
        { data: 'username' },
        { data: 'email' },
        { data: 'created_at' },
        { 
            data: null,
            render: function(data) {
                return `
                    <button class="btn btn-warning btn-sm editBtn" data-id="${data.id}">Edit</button>
                    <button class="btn btn-danger btn-sm deleteBtn" data-id="${data.id}">Delete</button>
                `;
            }
        }
    ]
});

    // Form submit (Insert or Update)
    $('#registrationForm').submit(function(e) {
        e.preventDefault();
        $.post('./API/api.php?action=' + ($('#userId').val() ? 'update' : 'insert'), $(this).serialize(), function() {
            table.ajax.reload();
            $('#registrationForm')[0].reset();
            $('#userId').val('');
        });
    });

    // Edit button click
    $('#accountsTable').on('click', '.editBtn', function() {
        let id = $(this).data('id');
        $.getJSON('./API/api.php?action=select&id=' + id, function(data) {
            $('#userId').val(data.id);
            $('#username').val(data.username);
            $('#email').val(data.email);
            $('#password').val('');
        });
    });

    // Delete button click
    $('#accountsTable').on('click', '.deleteBtn', function() {
        if(confirm('Are you sure you want to delete this account?')) {
            let id = $(this).data('id');
            $.post('./API/api.php?action=delete', { id: id }, function() {
                table.ajax.reload();
            });
        }
    });
});
</script>
</body>
</html>
